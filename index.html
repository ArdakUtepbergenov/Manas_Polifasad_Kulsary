<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: {
          display: ['"Space Grotesk"', 'system-ui', 'sans-serif'],
          sans: ['Inter', 'system-ui', 'sans-serif'],
          mono: ['"JetBrains Mono"', 'monospace'],
        },
        colors: {
          ink: {
            900: '#0E1116',
            800: '#161A20',
            700: '#1F242C',
            600: '#3A4049',
            500: '#5B6270',
            400: '#8A92A0',
            300: '#B8BFC9',
            200: '#D9DDE3',
            100: '#E8ECF0',
            50:  '#F5F7FA',
          },
          accent: {
            DEFAULT: '#1565C0',
            light: '#42A5F5',
            dark: '#0D4A92',
          },
          gold: {
            DEFAULT: '#B8935A',
            light: '#D4B07E',
            dark: '#8E6F3E',
          },
        },
        letterSpacing: {
          tightest: '-0.04em',
          'extra-tight': '-0.03em',
        },
        boxShadow: {
          'soft-sm': '0 1px 2px rgba(14,17,22,0.04), 0 1px 3px rgba(14,17,22,0.03)',
          'soft':    '0 2px 6px rgba(14,17,22,0.05), 0 8px 24px rgba(14,17,22,0.06)',
          'soft-lg': '0 4px 12px rgba(14,17,22,0.06), 0 24px 48px rgba(14,17,22,0.08)',
          'glow':    '0 12px 40px -8px rgba(21,101,192,0.35)',
        },
        animation: {
          'shimmer': 'shimmer 2.4s linear infinite',
          'marquee': 'marquee 40s linear infinite',
        },
        keyframes: {
          shimmer: {
            '0%':   { backgroundPosition: '-200% 0' },
            '100%': { backgroundPosition: '200% 0' },
          },
          marquee: {
            '0%':   { transform: 'translateX(0)' },
            '100%': { transform: 'translateX(-50%)' },
          },
        },
      }
    }
  }
</script>

<style>
  html, body { background: #FFFFFF; color: #0E1116; }
  body { font-family: Inter, system-ui, sans-serif; -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
  ::selection { background: #1565C0; color: #fff; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: #F5F7FA; }
  ::-webkit-scrollbar-thumb { background: #B8BFC9; border-radius: 999px; border: 2px solid #F5F7FA; }
  ::-webkit-scrollbar-thumb:hover { background: #8A92A0; }

  html { scroll-behavior: smooth; }

  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 900ms cubic-bezier(.16,1,.3,1), transform 900ms cubic-bezier(.16,1,.3,1); }
  .reveal.in { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 80ms; }
  .reveal-delay-2 { transition-delay: 160ms; }
  .reveal-delay-3 { transition-delay: 240ms; }
  .reveal-delay-4 { transition-delay: 320ms; }
  .reveal-delay-5 { transition-delay: 400ms; }

  .page-enter { animation: pageEnter 700ms cubic-bezier(.16,1,.3,1) both; }
  @keyframes pageEnter {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes kenburns {
    0%   { transform: scale(1.05) translate(0, 0); }
    100% { transform: scale(1.18) translate(-2%, -1%); }
  }
  .kenburns { animation: kenburns 18s ease-out infinite alternate; }

  .marquee-track { display: flex; width: max-content; animation: marquee 40s linear infinite; }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .display { font-family: "Space Grotesk", system-ui, sans-serif; letter-spacing: -0.03em; line-height: 0.96; }
  .eyebrow { font-family: "JetBrains Mono", monospace; font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase; }

  .glass {
    background: rgba(255,255,255,0.72);
    backdrop-filter: saturate(140%) blur(18px);
    -webkit-backdrop-filter: saturate(140%) blur(18px);
    border-bottom: 1px solid rgba(14,17,22,0.06);
  }
  .glass-dark {
    background: rgba(14,17,22,0.55);
    backdrop-filter: saturate(140%) blur(20px);
    -webkit-backdrop-filter: saturate(140%) blur(20px);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .uline { position: relative; }
  .uline::after { content: ''; position: absolute; left: 0; bottom: -3px; height: 1px; width: 0; background: currentColor; transition: width 400ms cubic-bezier(.16,1,.3,1); }
  .uline:hover::after { width: 100%; }

  input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type=number] { -moz-appearance: textfield; }

  .masonry { column-count: 1; column-gap: 16px; }
  @media (min-width: 640px) { .masonry { column-count: 2; column-gap: 20px; } }
  @media (min-width: 1024px) { .masonry { column-count: 3; column-gap: 24px; } }
  .masonry > * { break-inside: avoid; margin-bottom: 24px; }

  :focus-visible { outline: 2px solid #1565C0; outline-offset: 2px; border-radius: 4px; }

  img { transition: opacity 600ms ease; }

  .grain::before {
    content:''; position:absolute; inset:0; pointer-events:none; opacity:0.05;
    background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
    mix-blend-mode: overlay;
  }

  .word-reveal span { display: inline-block; opacity: 0; transform: translateY(60%); transition: opacity 800ms cubic-bezier(.16,1,.3,1), transform 800ms cubic-bezier(.16,1,.3,1); }
  .word-reveal.in span { opacity: 1; transform: translateY(0); }

  .lucide { stroke-width: 1.5; }
</style>
